<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch11 表單練習</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
</head>

<body>
    <div class="container pt-5">
        <div class="display-4 fw-900 text-center text-bg-primary py-2">產品建檔</div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="mb-3 form-floating">
                    <!-- id跟label for的名稱要一樣 -->
                    <input type="text" class="form-control form-control-lg" name="" id="pname" placeholder="">
                    <label for="pname" class="form-label">產品名稱（字數1-6）</label>
                    <div class="valid-feedback">符合字數規定</div>
                    <div class="invalid-feedback">不符合字數規定</div>
                </div>
                <div class="mb-3">
                    <!-- label>for 跟 input>id 設定一樣的名稱，游標點「產品數量」，會自動導到input位置 -->
                    <label for="pnum" class="form-label">產品數量（1-10）</label>
                    <input type="number" class="form-control form-control-lg" min="1" max="10" id="pnum">
                    <div class="valid-feedback">符合數量規定</div>
                    <div class="invalid-feedback">不符合數量規定</div>
                </div>
                <div class="mb-3">
                    <label for="pstandard" class="form-label">產品規格</label>
                    <input type="text" class="form-control form-control-lg" name="" id="pstandard"
                        list="datalistoption">
                    <datalist id="datalistoption">
                        <option value="去冰">去冰</option>
                        <option value="無糖">無糖</option>
                        <option value="散裝">散裝</option>
                    </datalist>
                </div>
                <div class="mb-3">
                    <select name="" id="pvolume" class="form-select form-select-lg">
                        <option value="" disabled selected class="text-center">***請選擇容量***</option>
                        <option value="特大">特大</option>
                        <option value="大">大</option>
                        <option value="中">中</option>
                        <option value="小">小</option>
                    </select>
                    <div class="valid-feedback">已選擇容量</div>
                    <div class="invalid-feedback">請選擇容量</div>
                </div>
                <div class="mb-3 form-check form-switch">
                    <!-- 初始值設定為打勾（checked） -->
                    <input type="checkbox" name="" id="pstatus" class="form-check-input" checked>
                    <label for="" class="form-check-label" id="pstatus_text">目前狀態：上架</label>
                </div>

                <div class="mb-3">
                    <div class="form-label fw-900">配料：至少一項</div>
                    <div id="topping_group" class="is-invalid">
                        <div class="form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="珍珠">
                            <label for="" class="form-check-label">珍珠</label>
                        </div>
                        <div class="mb-3 form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="椰果">
                            <label for="" class="form-check-label">椰果</label>
                        </div>
                        <div class="mb-3 form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="寒天">
                            <label for="" class="form-check-label">寒天</label>
                        </div>
                        <div class="mb-3 form-check form-check-inline">
                            <input type="checkbox" class="form-check-input topping_item" value="愛玉">
                            <label for="" class="form-check-label">愛玉</label>
                        </div>
                    </div>
                    <div class="valid-feedback">配料已選擇</div>
                    <div class="invalid-feedback">至少選擇一項配料</div>
                </div>

                <div class="mb-3">
                    <div class="form-label fw-900">取貨方式：至少一項</div>
                    <div id="delivery_group" class="is-invalid">
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input item_delivery" name="delivery" value="外送">
                            <label for="" class="form-check-label">外送</label>
                        </div>
                        <div class="mb-3 form-check form-check-inline">
                            <input type="radio" class="form-check-input item_delivery" name="delivery" value="現場">
                            <label for="" class="form-check-label">現場</label>
                        </div>
                        <div class="mb-3 form-check form-check-inline">
                            <input type="radio" class="form-check-input item_delivery" name="delivery" value="預約">
                            <label for="" class="form-check-label">預約</label>
                        </div>
                    </div>
                    <div class="valid-feedback">取貨方式已選擇</div>
                    <div class="invalid-feedback">至少選擇一種取貨方式</div>
                </div>

                <div class="text-end mt-4">
                    <button class="btn btn-secondary">取消</button>
                    <button class="btn btn-primary" id="ok_btn">確認</button>
                </div>
            </div>
        </div>
        <div id="review" class="row mt-5 justify-content-center d-none">
            <div class="display-5 fw-900 text-center text-bg-success py-2 rounded-3">產品建檔—明細確認</div>
            <div class="col-md-6 p-3">
                <div id="showmessage"></div>
                <button id="canel_btn" class="btn btn-secondary mt-e w-100">取消</button>
                <button id="confirm_btn" class="btn btn-warning mt-e w-100">確認送出</button>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let flag_pname = false;
        let flag_pnum = false;
        let flag_pvolume = false;
        let flag_pstandard = false;
        let flag_topping = false;
        let flag_delivery = false;
        $(function () {
            // 監聽#pname
            // .on("",) = 監聽前面的標籤，如果有被改，啟動後方的功能
            $("#pname").on("input", function () {
                // this在此是指pname，可以代稱任何變數
                console.log($(this).val().length);
                // trim() 消除空白鍵
                let pname = $(this).val().trim();

                if (pname.length >= 1 && pname.length <= 6) {
                    // 符合規定
                    // removeClass主要是為了避免兩個東西同時出現
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pname = true;
                } else {
                    // 不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pname = false;
                }
            })

            // 監聽#pnum數字記得使用Number()，不然會被視為字串
            $("#pnum").on("input", function () {

                let pnum = Number($(this).val());

                if (pnum >= 1 && pnum <= 10) {
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pnum = true;
                } else {
                    // 不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pnum = false;
                }
            })

            // 監聽#pstandard
            $("#pstandard").on("input", function () {

                console.log($(this).val());
                let pstandard = $(this).val().trim();

                if (pstandard.length >= 1 && pstandard.length <= 6) {
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pstandard = true;
                } else {
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pstandard = false;
                }
            })

            // 監聽.topping_item(.來呼叫class的名稱)
            $(".topping_item").on("change", function () {
                // .length計算長度，在這邊是計算打勾的項目數
                // .topping_item:checked冒號不能有空格
                let count = $(".topping_item:checked").length;
                if(count > 0){
                    $("#topping_group").removeClass("is-invalid");
                    $("#topping_group").addClass("is-valid");
                    flag_topping = true;
                }else{
                    $("#topping_group").removeClass("is-valid");
                    $("#topping_group").addClass("is-invalid");
                    flag_topping = false;
                }
            })
            
            // 監聽.delivery_group
            $(".item_delivery").on("change", function () {
                let delivery = $(".item_delivery:checked").val();
                
                if(delivery != undefined){
                    $("#delivery_group").removeClass("is-invalid");
                    $("#delivery_group").addClass("is-valid");
                    flag_delivery = true;
                }else{
                    $("#delivery_group").removeClass("is-valid");
                    $("#delivery_group").addClass("is-invalid");
                    flag_delivery = true;
                }
            })    


            // 監聽#pvolume
            $("#pvolume").on("change", function () {
                console.log($(this).val());
                // 建議只要是字串都要用trim處理
                let pvolume = $(this).val().trim();
                if (pvolume != "") {
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pvolume = true;
                } else {
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pvolume = false;
                }
            })

            // 監聽#pstatus
            $("#pstatus").on("change", function () {

                let pstatus = $(this).prop("checked");
                if (pstatus) {
                    $("#pstatus_text").text("目前狀態：上架");
                } else {
                    $("#pstatus_text").text("目前狀態：下架");
                }
            });


            // 監聽#ok_button
            $("#ok_btn").on("click", function () {
                if (flag_pname && flag_pnum && flag_pstandard && flag_pvolume && flag_topping && flag_delivery) {
                    console.log("correct");
                    // ? : = if 
                    // 判斷 pstatus是不是checked狀態，是的話，value是"上架"；不是的話，value是"下架"（三元運算子）
                    let pstatus = $("#pstatus").prop("checked") ? "上架" : "下架";

                    // 收集加入的配料
                    // 陣列
                    let toppingArray =[];
                    $(".topping_item:checked").each(function(){
                        // 把值寫入toppingArray陣列
                        toppingArray.push($(this).val());
                    });

                    // 取貨方式
                    let delivery = $(".item_delivery:checked").val();
                    // .join＝把陣列轉成字串，用("")中的符號隔開
                    let strHTML = `<h3>產品名稱：${$("#pname").val()}</h3>
                                    <h3>產品數量：${$("#pnum").val()}</h3>
                                    <h3>產品規格：${$("#pstandard").val()}</h3>
                                    <h3>產品容量：${$("#pvolume").val()}</h3>
                                    <h3>目前狀態：${pstatus}</h3>
                                    <h3>加入配料：${toppingArray.join("、")}</h3> 
                                    <h3>取貨方式：${delivery}</h3>`;// .join＝把陣列轉成字串，用("")中的符號隔開
                    $("#review").removeClass("d-none")
                    $("#showmessage").html(strHTML);
                } else {
                    Swal.fire({
                        // 要記得前面的script要先載入sweetalert (在網頁的installation)
                        title: "錯誤",
                        text: "欄位有誤，請修正",
                        icon: "error"
                    });

                    // 如果本來的code就有，不會重複加上去
                    $("#review").addClass("d-none")
                }

            });
        })
    </script>
</body>

</html>
